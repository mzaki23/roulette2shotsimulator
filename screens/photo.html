<div id="screen-photo" class="screen">
    <div class="appbar-mount"></div>

    <!-- Immersive stage area -->
    <main>
      <div class="photo-main-wrap">
        <!-- 16:9 photo stage: camera + member overlay -->
        <div class="photo-stage" id="photoStage">

          <!-- Camera panel -->
          <div class="photo-camera-panel" id="photoCameraPanel">
            <video id="photoVideo" autoplay playsinline muted></video>
            <canvas id="photoPreviewCanvas" class="photo-preview" style="display:none;"></canvas>
            <div class="photo-live-badge" id="photoLiveBadge">
              <div class="photo-live-dot"></div>
              <span class="photo-live-label">LIVE</span>
            </div>
          </div>

          <!-- Member panel -->
          <div class="photo-member-panel" id="photoMemberPanel">
            <img id="photoMemberImg" alt="" style="display:none;" />
            <div class="photo-member-silhouette" id="photoMemberSilhouette"></div>
          </div>

          <!-- Countdown overlay (inside stage = clipped to 16:9) -->
          <div class="photo-countdown" id="photoCountdown">
            <span class="photo-countdown-num" id="photoCountdownNum">3</span>
          </div>

          <!-- Date watermark (inside stage) -->
          <div class="photo-date-watermark" id="photoDateWatermark"></div>

        </div>

        <!-- Camera controls below stage -->
        <div class="photo-cam-controls">
          <button class="photo-cam-switch-btn" id="btnCamSwitch" onclick="openCameraSettings()">
            <span class="icon">flip_camera_android</span>
            Ganti Kamera
          </button>
          <div class="photo-cam-status" id="photoCamStatus"></div>
        </div>
      </div>
    </main>
    <div class="footer-mount"></div>
  </div>

  <!-- ============================================================
       CAMERA SETTINGS SHEET (bottom sheet overlay)
       ============================================================ -->
  <div id="cameraSheet" role="dialog" aria-modal="true" aria-label="Pilih Kamera">
    <div class="camera-sheet-card">
      <div class="camera-sheet-handle"></div>
      <div class="camera-sheet-title">
        <span class="icon">videocam</span>
        Pilih Kamera
      </div>
      <div class="camera-sheet-list" id="cameraSheetList">
        <div class="camera-sheet-empty">Memuat daftar kamera...</div>
      </div>
    </div>
  </div>

  <!-- ============================================================
       PHOTO RESULT MODAL
       ============================================================ -->
  <div id="photoResultModal" role="dialog" aria-modal="true" aria-label="Hasil Foto">
    <div class="photo-modal-card">
      <div class="photo-modal-img-wrap">
        <img id="photoModalImg" alt="Hasil foto" />
      </div>
      <div class="photo-modal-footer">
        <div class="photo-modal-info">
          <div class="photo-modal-eyebrow">2Shot bersama</div>
          <div class="photo-modal-member" id="photoModalMemberName">—</div>
        </div>
        <div class="photo-modal-btns">
          <button class="photo-modal-btn-ulangi" onclick="photoUlangi()">
            <span class="icon">replay</span> Ulangi
          </button>
          <button class="photo-modal-btn-download" onclick="photoDownload()">
            <span class="icon">download</span> Simpan Foto
          </button>
        </div>
      </div>
    </div>
  </div>
