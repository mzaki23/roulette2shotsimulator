<div id="screen-phase2" class="screen">

    <div class="appbar-mount"></div>

    <!-- "NOMORMU TERPANGGIL!" banner — slides down from appbar -->
    <div class="p2-banner" id="p2Banner">
      <span class="icon filled" style="color:var(--secondary-fixed);font-size:18px">star</span>
      <span class="p2-banner-text">Nomormu Terpanggil!</span>
      <span class="icon filled" style="color:var(--secondary-fixed);font-size:18px">star</span>
    </div>

    <!-- Scrollable body -->
    <div class="p2-body" id="p2Body">

      <!-- 3 stat cards -->
      <div class="p2-stats-grid">
        <div class="p2-stat-card">
          <span class="p2-stat-label">Terpanggil</span>
          <span class="p2-stat-val pink" id="p2StatCalled">0/48</span>
        </div>
        <div class="p2-stat-card">
          <span class="p2-stat-label">Nomormu</span>
          <span class="p2-stat-val gold" id="p2StatUserNum">—</span>
        </div>
        <div class="p2-stat-card">
          <span class="p2-stat-label">Status</span>
          <span class="p2-stat-val" id="p2StatStatus">⏳</span>
        </div>
      </div>

      <!-- Roulette hero circle -->
      <div class="p2-hero">
        <div class="p2-ring"></div>
        <div class="p2-circle" id="p2Circle">
          <span class="p2-num" id="p2Num">—</span>
        </div>
      </div>

      <!-- Progress bar -->
      <div class="p2-progress-wrap">
        <div class="p2-progress-meta">
          <span id="p2ProgressLabel">0 / 48 terpanggil</span>
          <span id="p2ProgressPct">0%</span>
        </div>
        <div class="p2-progress-track">
          <div class="p2-progress-fill" id="p2ProgressFill"></div>
        </div>
      </div>

      <!-- Riwayat panggilan -->
      <div class="p2-riwayat-wrap">
        <div class="p2-riwayat-label">Riwayat Panggilan</div>
        <div class="p2-pills" id="p2Pills">
          <span style="font-size:12px;color:var(--outline);font-style:italic;">Belum ada nomor terpanggil</span>
        </div>
      </div>

    </div><!-- /p2-body -->

    <!-- Bottom action bar -->
    <div class="p2-buttons">
      <div class="p2-btn-row">
        <button class="btn-putar-satu" id="btnPutarSatu" onclick="spinOne()">
          <span class="icon" style="font-size:18px">play_circle</span>
          Putar Satu
        </button>
        <button class="btn-putar-semua" id="btnPutarSemua" onclick="spinAll()">
          <span class="icon filled" style="font-size:18px">casino</span>
          Putar Semua
        </button>
      </div>
      <button class="btn-lanjut" id="btnLanjut" onclick="navigateTo('phase3')">
        <span class="icon filled" style="font-size:20px">arrow_forward</span>
        Lanjut ke 2Shot
      </button>
    </div>
    <div class="footer-mount"></div>

  </div>
